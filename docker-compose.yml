version: "3.8"
services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: . #vai ler o dockerfile pra criar a imagem
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis

  worker:
    build: .
    command: python3 worker.py
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
